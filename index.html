      const savedState = useMemo(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : null;
        } catch (e) { return null; }
      }, []);

      const [originalCards] = useState(BUILTIN_VOCAB);
      const [reviewQueue, setReviewQueue] = useState(savedState?.reviewQueue || [...BUILTIN_VOCAB]);
      const [stats, setStats] = useState(savedState?.stats || { again: 0, hard: 0, good: 0, easy: 0 });
      const [cardLevels, setCardLevels] = useState(savedState?.cardLevels || {}); // 紀錄每個字的學習等級
      const [isFinished, setIsFinished] = useState(savedState?.isFinished || false);
      const [isFlipped, setIsFlipped] = useState(false);
      const [showInfoModal, setShowInfoModal] = useState(false);

      useEffect(() => {
        const stateToSave = { reviewQueue, stats, cardLevels, isFinished };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stateToSave));
      }, [reviewQueue, stats, cardLevels, isFinished]);

      const speak = useCallback((text) => {
        if (!text) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }, []);

      const handleRestart = () => {
        setReviewQueue([...originalCards]);
        setStats({ again: 0, hard: 0, good: 0, easy: 0 });
        setCardLevels({});
        setIsFinished(false);
        setIsFlipped(false);
      };

      const handleClearSave = () => {
        if (confirm("確定要清除所有進度並重新開始嗎？")) {
          localStorage.removeItem(STORAGE_KEY);
          window.location.reload();
        }
      };

      const handleExport = () => {
        let csvContent = "\ufeff單字,學習狀態,解釋\n";
        originalCards.forEach(card => {
          const level = cardLevels[card.word] || '未練習';
          csvContent += `"${card.word}","${level}","${card.meaning}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `雅思學習紀錄_${new Date().toLocaleDateString()}.csv`);
        link.click();
      };

      const toggleFlip = useCallback(() => setIsFlipped(true), []);

      const handleSRS = useCallback((type) => {
        const currentCard = reviewQueue[0];
        setCardLevels(prev => ({ ...prev, [currentCard.word]: type }));
        setStats(prev => ({ ...prev, [type]: prev[type] + 1 }));
        
        setReviewQueue(prevQueue => {
          const newQueue = [...prevQueue];
          const card = newQueue.shift(); 
          if (type === 'again') newQueue.splice(newQueue.length > 0 ? 1 : 0, 0, card);
          else if (type === 'hard') newQueue.splice(Math.floor(newQueue.length / 2), 0, card);
          else if (type === 'good') newQueue.push(card);
          if (newQueue.length === 0) setIsFinished(true);
          return newQueue;
        });
        setIsFlipped(false);
      }, [reviewQueue]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (showInfoModal) { if (e.key === 'Escape') setShowInfoModal(false); return; }
          if (isFinished) return;
          if (e.key === 'Enter') {
            const card = reviewQueue[0];
            if (card) speak(isFlipped ? card.example : card.word);
          } else if (e.key === ' ') { if (!isFlipped) toggleFlip(); }
          else if (isFlipped) {
            if (e.key === '1') handleSRS('again');
            if (e.key === '2') handleSRS('hard');
            if (e.key === '3') handleSRS('good');
            if (e.key === '4') handleSRS('easy');
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [isFinished, reviewQueue, isFlipped, speak, toggleFlip, handleSRS, showInfoModal]);

      const currentPosition = originalCards.length - reviewQueue.length + 1;
      const progressPercentage = ( (originalCards.length - reviewQueue.length) / originalCards.length ) * 100;
      const currentCard = reviewQueue[0];
      const currentImageUrl = currentCard ? `https://loremflickr.com/400/200/${encodeURIComponent(currentCard.word)}` : '';

      if (isFinished) {
        return (
          <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 text-center space-y-8 animate-zoom-in">
            <div className="w-24 h-24 bg-yellow-50 text-yellow-500 rounded-full flex items-center justify-center mx-auto mb-2 animate-bounce"><TrophyIcon size={48} /></div>
            <h1 className="text-3xl font-bold text-gray-800">練習完成！</h1>
            <div className="bg-gray-50 rounded-2xl p-6 grid grid-cols-2 gap-4 text-left w-full max-w-md">
              {['again', 'hard', 'good', 'easy'].map(k => (
                <div key={k} className="bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                  <span className="text-xs font-bold uppercase block mb-1">{k}</span>
                  <span className="text-2xl font-black text-gray-700">{stats[k]}</span>
                </div>
              ))}
            </div>
            <div className="flex flex-col gap-3 w-full max-w-md">
              <button onClick={handleExport} className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2"><DownloadIcon size={20}/>匯出學習紀錄 (Excel/Sheet)</button>
              <button onClick={handleRestart} className="w-full bg-gray-800 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2"><RotateCcwIcon size={20}/>重新開始</button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col items-center py-6 px-4 relative">
          {showInfoModal && (
            <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in" onClick={() => setShowInfoModal(false)}>
              <div className="bg-white rounded-[2rem] shadow-2xl p-8 w-full max-w-sm relative animate-zoom-in" onClick={e => e.stopPropagation()}>
                <button onClick={() => setShowInfoModal(false)} className="absolute top-5 right-5 p-2 text-gray-400"><XIcon size={20}/></button>
                <h3 className="text-xl font-bold mb-6 flex items-center gap-2"><InfoIcon size={24} className="text-blue-500"/>設定與紀錄</h3>
                <div className="space-y-3">
                  <button onClick={handleExport} className="w-full p-4 bg-blue-50 text-blue-700 rounded-xl font-bold flex items-center justify-center gap-2"><DownloadIcon size={18}/>匯出學習紀錄 (.csv)</button>
                  <button onClick={handleClearSave} className="w-full p-4 bg-red-50 text-red-600 rounded-xl font-bold flex items-center justify-center gap-2"><Trash2Icon size={18}/>清除所有進度</button>
                </div>
                <p className="mt-6 text-xs text-gray-400 italic text-center">提示：匯出的檔案可用 Google Sheets 開啟</p>
              </div>
            </div>
          )}

          <div className="w-full max-w-2xl flex flex-col h-full space-y-4">
            <div className="w-full bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
              <div className="flex justify-between items-center text-sm font-bold">
                <div className="flex items-center gap-2">
                  <span className="bg-gray-800 text-white px-2 py-0.5 rounded text-xs">IELTS</span>
                  <span className="text-gray-800">第 {currentPosition} / {originalCards.length} 張</span>
                </div>
                <button onClick={() => setShowInfoModal(true)} className="p-1 text-gray-400"><InfoIcon size={20}/></button>
              </div>
              <div className="flex gap-2">
                {['again', 'hard', 'good', 'easy'].map(k => (
                  <div key={k} className={`flex-1 px-2 py-1 rounded-lg text-center border ${k==='again'?'bg-red-50 text-red-600 border-red-100':k==='hard'?'bg-orange-50 text-orange-600 border-orange-100':k==='good'?'bg-blue-50 text-blue-600 border-blue-100':'bg-green-50 text-green-600 border-green-100'}`}>
                    <div className="text-[10px] uppercase font-black opacity-60">{k}</div>
                    <div className="text-lg font-black leading-none">{stats[k]}</div>
                  </div>
                ))}
              </div>
              <div className="w-full h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div className="h-full bg-gray-800 transition-all duration-500" style={{ width: `${progressPercentage}%` }}></div>
              </div>
            </div>

            <div className="relative w-full bg-white rounded-[2rem] shadow-xl border border-gray-100 overflow-hidden flex-1 flex flex-col min-h-[450px]">
              <div className="flex-1 p-6 sm:p-8 flex flex-col justify-center">
                {!isFlipped ? (
                  <div className="flex flex-col items-center justify-center h-64 sm:h-80 cursor-pointer active:scale-95 transition-transform" onClick={() => speak(currentCard?.word)}>
                    <h2 className="text-5xl sm:text-6xl font-black text-gray-800 text-center leading-tight">{currentCard?.word}</h2>
                    <div className="mt-6 text-blue-400 flex items-center gap-2 font-bold animate-pulse"><Volume2Icon size={20}/> 點擊發音</div>
                  </div>
                ) : (
                  <div className="flex flex-col h-full animate-slide-up">
                    <div className="w-full h-36 sm:h-44 rounded-xl overflow-hidden bg-gray-100 mb-4 shadow-inner">
                      <img src={currentImageUrl} alt={currentCard?.word} className="w-full h-full object-cover animate-fade-in" />
                    </div>
                    <div className="flex-1 flex flex-col space-y-3">
                      <div className="flex items-end gap-3 border-b pb-2 cursor-pointer" onClick={() => speak(currentCard?.word)}>
                        <h3 className="text-2xl font-bold text-gray-800">{currentCard?.word}</h3>
                        {currentCard?.phonetic && <span className="text-base text-gray-500 font-mono italic">/{currentCard?.phonetic}/</span>}
                      </div>
                      <div className="flex items-start gap-2">
                        {currentCard?.partOfSpeech && <span className="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs font-bold rounded mt-0.5">{currentCard?.partOfSpeech}</span>}
                        <p className="text-lg text-gray-800 font-bold leading-tight">{currentCard?.meaning}</p>
                      </div>
                      {currentCard?.example && (
                        <div className="px-4 py-3 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer active:bg-gray-100 transition-colors" onClick={() => speak(currentCard?.example)}>
                          <p className="text-base text-gray-600 leading-snug italic">"{currentCard?.example}"</p>
                        </div>
                      )}
                    </div>
                    <div className="pt-3 mt-3 border-t grid grid-cols-4 gap-2">
                      {['again', 'hard', 'good', 'easy'].map(k => (
                        <button key={k} onClick={() => handleSRS(k)} className={`py-3 rounded-xl font-black uppercase text-xs sm:text-sm active:scale-90 transition-all ${k==='again'?'bg-red-50 text-red-600':k==='hard'?'bg-orange-50 text-orange-600':k==='good'?'bg-blue-50 text-blue-600':'bg-green-50 text-green-600'}`}>{k}</button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>

            {!isFlipped && (
              <div className="flex justify-center">
                <button onClick={toggleFlip} className="w-full max-w-sm flex items-center justify-center gap-3 bg-gray-800 text-white px-8 py-5 rounded-2xl font-bold shadow-lg active:scale-95 transition-all text-xl">
                  <RotateCwIcon size={24} /><span>看解答</span>
                </button>
              </div>
            )}
          </div>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
